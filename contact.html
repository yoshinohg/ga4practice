<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ | GA4 Practice Demo</title>
  <meta name="description" content="GA4勉強会向けのお問い合わせページです。generate_lead のデモに使えます。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/style.css">
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-V3QZYX545S"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-V3QZYX545S');
</script>
</head>
<body data-page-name="contact">
  <div class="page-shell">
    <header class="hero">
      <nav class="topbar" aria-label="グローバルナビゲーション">
        <a class="brand" href="index.html">GA4 Practice</a>
        <div class="topbar-links">
          <a href="index.html">トップ</a>
          <a href="about.html">サービス紹介</a>
          <a href="pricing.html">料金</a>
          <a href="contact.html" aria-current="page">お問い合わせ</a>
        </div>
      </nav>

      <section class="hero-copy">
        <p class="eyebrow">Lead Form</p>
        <h1>問い合わせ完了をリード獲得イベントとして扱う</h1>
        <p class="hero-text">トップや料金ページから流入してきた利用者が最終的に送信する想定です。ファネルの終点として説明しやすいページです。</p>
        <div class="hero-actions">
          <a class="secondary-button" href="pricing.html" data-track-click="navigate_section" data-track-label="back_to_pricing">料金へ戻る</a>
          <button class="primary-button" type="button" data-track-click="cta_click" data-track-label="contact_page_primary">相談前に資料を見る</button>
        </div>
      </section>
    </header>

    <main>
      <section class="section">
        <div class="section-heading">
          <p class="eyebrow">Lead Capture</p>
          <h2>フォーム送信イベントを確認する</h2>
          <p>入力内容は保存せず、送信イベントだけをGA4へ送る想定です。</p>
        </div>

        <form class="lead-form panel" id="demo-form">
          <label>
            お名前
            <input type="text" name="name" placeholder="山田 太郎" required>
          </label>
          <label>
            メールアドレス
            <input type="email" name="email" placeholder="sample@example.com" required>
          </label>
          <label>
            興味のあるテーマ
            <select name="topic" required>
              <option value="">選択してください</option>
              <option value="event-design">イベント設計</option>
              <option value="debug-view">DebugViewの使い方</option>
              <option value="report-analysis">レポート分析</option>
            </select>
          </label>
          <button type="submit" class="primary-button">送信してイベント発火</button>
          <p class="form-note">勉強会では generate_lead と form_submit の違いもあわせて説明できます。</p>
        </form>
      </section>
    </main>

    <aside class="event-console panel" aria-live="polite">
      <div>
        <p class="eyebrow">Debug Console</p>
        <h2>最後に送ったイベント</h2>
      </div>
      <pre id="event-log">まだイベントは送信されていません。</pre>
    </aside>
  </div>

  <script src="assets/app.js"></script>
</body>
</html>
